<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  
  <!-- Book shape -->
  <rect x="90" y="130" width="332" height="252" rx="20" fill="white"/>
  
  <!-- Book spine -->
  <rect x="90" y="130" width="40" height="252" rx="10" fill="#4ecdc4"/>
  
  <!-- Vietnamese accent marks on book -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ff6b6b">Ă</text>
  <text x="280" y="220" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#45b7d1">Ô</text>
  <text x="360" y="220" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#ff6b6b">Ơ</text>
  
  <!-- Pencil -->
  <rect x="310" y="350" width="25" height="120" rx="5" fill="#ffd700" transform="rotate(-45 322 410)"/>
  <polygon points="350,420 365,435 340,435" fill="#ffcc00" transform="rotate(-45 352 427)"/>
  <rect x="310" y="340" width="25" height="30" fill="#ff6b6b" transform="rotate(-45 322 355)"/>
  
  <!-- Star decorations -->
  <text x="140" y="300" font-size="40">⭐</text>
  <text x="380" y="320" font-size="35">✨</text>
  
  <!-- Vietnamese flag colors at bottom -->
  <rect x="120" y="400" width="50" height="8" rx="4" fill="#ff6b6b"/>
  <rect x="180" y="400" width="50" height="8" rx="4" fill="#ffd700"/>
  <rect x="240" y="400" width="50" height="8" rx="4" fill="#4ecdc4"/>
</svg>